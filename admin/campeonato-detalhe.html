<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Games 2026 — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <span class="badge badge-amber">Inscrições abertas</span>
    </div>
    <div class="content">
      <div class="grid g-4" style="margin-bottom:28px">
        <a href="categorias.html" class="card" style="text-decoration:none"><div class="label text-faint" style="font-size:12px">Categorias</div><div id="n-cat" style="font-size:24px;font-weight:700;margin-top:8px">0</div></a>
        <a href="provas.html" class="card" style="text-decoration:none"><div class="label text-faint" style="font-size:12px">Provas</div><div id="n-provas" style="font-size:24px;font-weight:700;margin-top:8px">0</div></a>
        <a href="baterias.html" class="card" style="text-decoration:none"><div class="label text-faint" style="font-size:12px">Baterias</div><div id="n-baterias" style="font-size:24px;font-weight:700;margin-top:8px">0</div></a>
        <a href="equipes.html" class="card" style="text-decoration:none"><div class="label text-faint" style="font-size:12px">Equipes</div><div id="n-equipes" style="font-size:24px;font-weight:700;margin-top:8px">0</div></a>
      </div>
      <div class="card">
        <h3 class="h-display" style="font-size:18px;margin-bottom:14px" id="d-nome">—</h3>
        <p class="text-dim" style="font-size:14px;margin-bottom:20px" id="d-desc">—</p>
        <div class="flex gap-12" style="flex-wrap:wrap">
          <a href="../index.html" target="_blank" class="btn btn-ghost btn-sm">Ver landing page ↗</a>
          <a href="resultados.html" class="btn btn-ghost btn-sm">Aprovar resultados</a>
          <a href="ranking.html" class="btn btn-ghost btn-sm">Ver ranking</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','campeonatos');
const camp = arenaCampeonatoAtivo();
renderTopbar(camp ? camp.nome : 'Campeonato', 'Visão geral do campeonato');
document.getElementById('n-cat').textContent = arenaListar('categorias').length;
document.getElementById('n-provas').textContent = arenaListar('provas').length;
document.getElementById('n-baterias').textContent = arenaListar('baterias').length;
document.getElementById('n-equipes').textContent = arenaListar('equipes').length;
document.getElementById('d-nome').textContent = camp ? camp.nome : 'Nenhum campeonato ativo';
document.getElementById('d-desc').textContent = camp ? (camp.descricao||'') + (camp.local ? ' · '+camp.local : '') : '';
</script>
</body>
</html>
