<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonatos — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <a href="novo-campeonato.html" class="btn btn-primary btn-sm">+ Novo campeonato</a>
    </div>
    <div class="content">

      <h4 style="font-size:13px;color:var(--chalk-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Atual</h4>
      <div id="atual-wrap" style="margin-bottom:36px"></div>

      <h4 style="font-size:13px;color:var(--chalk-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Edições arquivadas</h4>
      <div class="grid" style="grid-template-columns:1fr;gap:16px" id="arquivados-wrap"></div>
      <p class="text-faint" id="arquivados-vazio" style="display:none">Nenhuma edição arquivada ainda.</p>

    </div>
  </div>
</div>
<div class="toast" id="toast"><span>✅</span><span id="toast-msg"></span></div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','campeonatos');
renderTopbar('Campeonatos','Todos os campeonatos da Crossbox');

const ESTADOS_LABEL = {rascunho:'Em configuração', pre_inscricao:'Em breve', inscricoes_abertas:'Inscrições abertas', inscricoes_encerradas:'Inscrições encerradas', andamento:'Em andamento', finalizado:'Finalizado'};

function renderAtual(){
  const camp = arenaCampeonatoAtivo();
  const wrap = document.getElementById('atual-wrap');
  if(!camp){
    wrap.innerHTML = `<div class="card" style="text-align:center;padding:40px 24px">
      <p class="text-dim" style="margin-bottom:16px">Nenhum campeonato em andamento no momento.</p>
      <a href="novo-campeonato.html" class="btn btn-primary btn-sm">Criar campeonato</a>
    </div>`;
    return;
  }
  const equipes = arenaListar('equipes');
  const publico = ARENA_ESTADOS_PUBLICOS.includes(camp.estado) && camp.estado !== 'rascunho';
  wrap.innerHTML = `<div class="card flex justify-between items-center" style="flex-wrap:wrap;gap:16px">
    <div>
      <div class="flex items-center gap-12" style="margin-bottom:8px"><h3 class="h-display" style="font-size:19px">${camp.nome||'Sem nome'}</h3><span class="badge ${camp.estado==='rascunho'?'badge-muted':'badge-amber'}">${ESTADOS_LABEL[camp.estado]||camp.estado}</span></div>
      <p class="text-faint" style="font-size:13px">${camp.dataInicioEvento||'Data não definida'} · ${equipes.length} equipe(s)</p>
    </div>
    <div class="flex gap-8" style="flex-wrap:wrap">
      <a href="novo-campeonato.html" class="btn btn-ghost btn-sm">${camp.estado==='rascunho' ? 'Continuar configuração' : 'Editar'}</a>
      ${publico ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="arquivar()">Encerrar e arquivar</button>` : ''}
    </div>
  </div>`;
}

function renderArquivados(){
  const arquivados = arenaLoad('campeonatos_arquivados', []);
  document.getElementById('arquivados-vazio').style.display = arquivados.length ? 'none' : 'block';
  document.getElementById('arquivados-wrap').innerHTML = arquivados.slice().reverse().map(a=>`
    <div class="card flex justify-between items-center" style="opacity:.9;flex-wrap:wrap;gap:14px">
      <div>
        <div class="flex items-center gap-12" style="margin-bottom:8px"><h3 class="h-display" style="font-size:19px">${a.campeonato.nome||'Sem nome'}</h3><span class="badge badge-muted">Arquivado</span></div>
        <p class="text-faint" style="font-size:13px">${a.equipes.length} equipes · arquivado em ${a.arquivadoEm}</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="duplicar('${a.id}')">Duplicar como novo campeonato</button>
    </div>`).join('');
}

function arquivar(){
  if(!confirm('Arquivar o campeonato atual? Isso limpa categorias, provas e baterias pra começar uma nova edição do zero (as contas de atletas e o catálogo de exercícios continuam).')) return;
  const r = arenaArquivarCampeonatoAtual();
  if(r.erro){ mostrarToast(r.erro); return; }
  mostrarToast('Campeonato arquivado.');
  renderAtual(); renderArquivados();
}
function duplicar(id){
  const r = arenaDuplicarCampeonatoArquivado(id);
  if(r.erro){ mostrarToast(r.erro); return; }
  mostrarToast('Campeonato duplicado — ajuste nome e datas.');
  setTimeout(()=>window.location.href='novo-campeonato.html', 900);
}
function mostrarToast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

renderAtual(); renderArquivados();
</script>
</body>
</html>
