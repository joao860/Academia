<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipes — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar"><div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div></div>
    <div class="content">
      <div class="kanban" id="kanban"></div>
    </div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','equipes');
const equipes = arenaListar('equipes');
renderTopbar('Equipes', equipes.length + ' equipe(s) inscrita(s)');

const colunas = [
  {id:'montando', label:'Montando'},
  {id:'aguardando_pagamento', label:'Aguardando pagamento'},
  {id:'confirmada', label:'Confirmada'},
  {id:'competindo', label:'Competindo'},
];
document.getElementById('kanban').innerHTML = colunas.map(c=>`
  <div class="kanban-col">
    <h4>${c.label} (${equipes.filter(e=>e.status===c.id).length})</h4>
    ${equipes.filter(e=>e.status===c.id).map(e=>`
      <div class="kanban-card">
        <strong>${e.nome}</strong>
        <div class="text-faint" style="font-size:11.5px;margin:4px 0 8px">${e.categoria} · ${e.membros.length} membro(s)</div>
        <div class="flex" style="gap:4px">${e.membros.map(m=>`<span class="badge ${m.pago?'badge-success':'badge-amber'}" style="font-size:9.5px">${m.avatar}</span>`).join('')}</div>
      </div>`).join('') || '<p class="text-faint" style="font-size:12.5px">Nenhuma equipe.</p>'}
  </div>`).join('');
</script>
</body>
</html>
