<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercícios — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('modal-ex').classList.add('open')">+ Novo exercício</button>
    </div>
    <div class="content">
      <p class="text-dim" style="margin-bottom:20px;max-width:520px">Este catálogo é da <strong>Crossbox</strong>, não de um campeonato específico — cadastre uma vez, reutilize em quantas provas e campeonatos quiser, pra sempre.</p>
      <div class="grid g-4" id="ex-grid"></div>
      <p class="text-faint" id="ex-vazio" style="display:none">Catálogo vazio ainda. Cadastre o primeiro exercício.</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-ex">
  <div class="modal">
    <h3 class="h-display" style="font-size:20px;margin-bottom:18px">Novo exercício</h3>
    <div class="field"><label>Nome</label><input type="text" id="m-nome" placeholder="Ex: Snatch"></div>
    <div class="field"><label>Tipo</label><input type="text" id="m-tipo" placeholder="Levantamento / Ginástico / Cardio / Funcional"></div>
    <div class="field"><label>Métricas utilizadas</label>
      <div class="flex" style="flex-wrap:wrap;gap:8px" id="m-metricas"></div>
    </div>
    <div class="flex gap-12"><button class="btn btn-ghost" onclick="document.getElementById('modal-ex').classList.remove('open')">Cancelar</button><button class="btn btn-primary" style="flex:1" onclick="salvarExercicio()">Salvar</button></div>
  </div>
</div>
<div class="toast" id="toast"><span>✅</span><span id="toast-msg"></span></div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','exercicios');
renderTopbar('Catálogo de exercícios','Permanente — usado na montagem de provas de qualquer campeonato');

let metricasSelecionadas = new Set();

function renderEx(){
  const exs = arenaCatalogoExercicios();
  document.getElementById('ex-vazio').style.display = exs.length ? 'none' : 'block';
  document.getElementById('ex-grid').innerHTML = exs.map(e=>`
    <div class="card" style="text-align:center">
      <div style="font-size:30px;margin-bottom:8px">${e.img||'⭐'}</div>
      <strong style="font-size:14.5px">${e.nome}</strong>
      <div class="text-faint" style="font-size:11.5px;margin:6px 0 10px">${e.tipo}</div>
      <div class="flex" style="flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:12px">${(e.metricas||[]).map(m=>`<span class="badge badge-muted" style="font-size:10px">${m}</span>`).join('')}</div>
      <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removerExercicio('${e.id}')">Remover</button>
    </div>`).join('');
}
function renderMetricasCheck(){
  document.getElementById('m-metricas').innerHTML = METRICAS.map(m=>`<div class="chip" onclick="toggleMetrica('${m}',this)">${m}</div>`).join('');
}
function toggleMetrica(m, el){ metricasSelecionadas.has(m)?metricasSelecionadas.delete(m):metricasSelecionadas.add(m); el.classList.toggle('selected'); }
function salvarExercicio(){
  const nome = document.getElementById('m-nome').value.trim(); if(!nome) return;
  arenaAdicionarExercicio({nome, tipo:document.getElementById('m-tipo').value||'Personalizado', metricas:[...metricasSelecionadas].length?[...metricasSelecionadas]:['Repetições'], img:'⭐'});
  document.getElementById('modal-ex').classList.remove('open');
  document.getElementById('m-nome').value=''; document.getElementById('m-tipo').value=''; metricasSelecionadas.clear();
  renderEx(); renderMetricasCheck();
  mostrarToast('Exercício "'+nome+'" cadastrado no catálogo.');
}
function removerExercicio(id){ arenaRemoverExercicio(id); renderEx(); }
function mostrarToast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
renderEx(); renderMetricasCheck();
</script>
<style>.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-hi);border:1px solid var(--border-hi);border-radius:100px;padding:7px 12px;font-size:12.5px;cursor:pointer;}.chip.selected{border-color:var(--flame);background:rgba(var(--flame-rgb),.1);color:var(--flame-hi);}</style>
</body>
</html>
