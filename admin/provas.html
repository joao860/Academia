<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provas — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <a href="novo-campeonato.html" class="btn btn-primary btn-sm">+ Montar nova prova</a>
    </div>
    <div class="content" id="provas-wrap"></div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','provas');
const campeonato = arenaCampeonatoAtivo();
renderTopbar('Provas', campeonato ? campeonato.nome : 'Nenhum campeonato ativo');

const provas = arenaListar('provas');
document.getElementById('provas-wrap').innerHTML = provas.length ? provas.map((p,idx)=>`
  <div class="card" style="margin-bottom:20px">
    <div class="flex justify-between items-center" style="margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <span class="mono text-faint" style="font-size:11px">PROVA ${idx+1}</span>
        <h3 class="h-display" style="font-size:20px">${p.nome}</h3>
      </div>
      <div class="flex gap-8" style="flex-wrap:wrap">
        <span class="badge badge-muted">${p.arena||'—'}</span>
        <span class="badge badge-muted">Time cap ${p.timecap||'—'}</span>
        <span class="badge badge-amber">${(PONTUACAO_PRESETS.find(x=>x.id===p.pontuacao)||{nome:'—'}).nome}</span>
      </div>
    </div>
    <div style="margin-bottom:14px">${(p.cats||[]).map(c=>`<span class="badge badge-muted" style="margin-right:6px">${c}</span>`).join('')}</div>
    <div>${(p.blocos||[]).map((b,i)=>`
      <div class="builder-block">
        <span class="ord">${i+1}</span><span class="ic">${b.img||''}</span>
        <div class="meta"><strong>${b.nome}</strong><span>${b.detalhe||''}</span></div>
      </div>`).join('')}</div>
  </div>`).join('') : `<div class="card" style="text-align:center;padding:56px 24px"><h3 class="h-display" style="font-size:20px;margin-bottom:10px">Nenhuma prova criada ainda</h3><p class="text-dim">Use o assistente de criação de campeonato pra montar a primeira.</p></div>`;
</script>
</body>
</html>
