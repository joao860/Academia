<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <a href="novo-campeonato.html" class="btn btn-primary btn-sm">+ Novo campeonato</a>
    </div>
    <div class="content">

      <div class="grid g-4" style="margin-bottom:28px">
        <div class="stat-card"><div class="label">Equipes cadastradas</div><div class="value" id="k-equipes">0</div></div>
        <div class="stat-card"><div class="label">Atletas com conta</div><div class="value" id="k-atletas">0</div></div>
        <div class="stat-card"><div class="label">Equipes confirmadas</div><div class="value" id="k-confirmadas">0</div></div>
        <div class="stat-card"><div class="label">Resultados pendentes</div><div class="value" style="color:var(--amber)" id="k-pendentes">0</div><a href="resultados.html" class="delta" style="color:var(--flame-hi)">Revisar agora →</a></div>
      </div>

      <div class="grid" style="grid-template-columns:1.3fr .9fr;gap:24px;margin-bottom:28px">
        <div class="card" id="camp-card"></div>
        <div class="card">
          <h3 class="h-display" style="font-size:16px;margin-bottom:18px">Checklist de publicação</h3>
          <div id="dash-checklist"></div>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','dashboard');
renderTopbar('Dashboard', 'Visão geral da Crossbox');

const equipes = arenaListar('equipes');
const usuarios = arenaLoad('usuarios', []);
const camp = arenaCampeonatoAtivo();
const pendentes = arenaLoad('resultados_pendentes', []).filter(p=>p.status==='pendente');

document.getElementById('k-equipes').textContent = equipes.length;
document.getElementById('k-atletas').textContent = usuarios.length;
document.getElementById('k-confirmadas').textContent = equipes.filter(e=>e.status==='confirmada').length;
document.getElementById('k-pendentes').textContent = pendentes.length;

const categorias = arenaListar('categorias'), provas = arenaListar('provas'), baterias = arenaListar('baterias'), juizes = arenaLoad('juizes', []);

document.getElementById('camp-card').innerHTML = camp ? `
  <div class="flex justify-between items-center" style="margin-bottom:20px">
    <h3 class="h-display" style="font-size:16px">${camp.nome}</h3>
    <span class="badge ${camp.estado==='rascunho'?'badge-muted':'badge-amber'}">${camp.estado==='rascunho'?'Em configuração':'Publicado'}</span>
  </div>
  <p class="text-dim" style="font-size:13.5px;margin-bottom:18px">${equipes.reduce((n,e)=>n+e.membros.length,0)} atleta(s) inscrito(s) · ${camp.vagasTotais||0} vagas totais</p>
  <div class="progress" style="margin-bottom:24px"><span style="width:${camp.vagasTotais ? Math.min(100, Math.round(100*equipes.reduce((n,e)=>n+e.membros.length,0)/camp.vagasTotais)) : 0}%"></span></div>
  <div class="grid g-3">
    <div><div class="text-faint" style="font-size:12px">Categorias</div><div style="font-weight:700;font-size:18px">${categorias.length}</div></div>
    <div><div class="text-faint" style="font-size:12px">Provas configuradas</div><div style="font-weight:700;font-size:18px">${provas.length}</div></div>
    <div><div class="text-faint" style="font-size:12px">Juízes cadastrados</div><div style="font-weight:700;font-size:18px">${juizes.length}</div></div>
  </div>
` : `<div style="text-align:center;padding:20px 0"><p class="text-dim" style="margin-bottom:16px">Nenhum campeonato criado ainda.</p><a href="novo-campeonato.html" class="btn btn-primary btn-sm">Criar campeonato</a></div>`;

const itensChecklist = [
  {ok:categorias.length>0, label:'Categorias configuradas'},
  {ok:arenaCatalogoExercicios().length>0, label:'Exercícios cadastrados'},
  {ok:provas.length>0, label:'Provas criadas'},
  {ok:baterias.length>0, label:'Baterias agendadas'},
  {ok:!!(camp && ARENA_ESTADOS_PUBLICOS.includes(camp.estado) && camp.estado!=='rascunho'), label:'Campeonato publicado'},
];
document.getElementById('dash-checklist').innerHTML = itensChecklist.map(i=>`
  <div class="checklist-item"><div class="chk-icon ${i.ok?'chk-done':'chk-pending'}">${i.ok?'✓':'!'}</div><span class="${i.ok?'':'text-dim'}">${i.label}</span></div>`).join('');
</script>
</body>
</html>
