<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <button class="btn btn-ghost btn-sm">Publicar ranking oficial</button>
    </div>
    <div class="content">
      <div class="tabs" id="cat-tabs"></div>
      <div class="card" style="overflow-x:auto">
        <table class="table">
          <thead><tr><th>#</th><th>Equipe</th><th>Categoria</th><th>Pontos</th></tr></thead>
          <tbody id="rk-body"></tbody>
        </table>
      </div>
      <p class="text-faint" id="rk-vazio" style="display:none;margin-top:16px">Nenhum resultado aprovado ainda — o ranking aparece aqui conforme os juízes enviam e você aprova resultados.</p>
    </div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','ranking'); renderTopbar('Ranking','Atualiza automaticamente a cada aprovação');

const categorias = arenaListar('categorias');
document.getElementById('cat-tabs').innerHTML = categorias.length
  ? categorias.map((c,i)=>`<div class="tab ${i===0?'active':''}">${c.nome}</div>`).join('')
  : '<div class="tab active">Todas</div>';

const ranking = arenaListar('ranking').sort((a,b)=>(a.pos||99)-(b.pos||99));
document.getElementById('rk-vazio').style.display = ranking.length ? 'none' : 'block';
document.getElementById('rk-body').innerHTML = ranking.map(r=>`
  <tr><td><span class="rank-num ${r.pos<=3?'top':''}">${r.pos}º</span></td><td>${r.equipe}</td><td><span class="badge badge-muted">${r.categoria||'—'}</span></td><td class="mono" style="font-weight:700">${r.pontos} pts</td></tr>`).join('');
</script>
</body>
</html>
