<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrocinadores — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('modal-sp').classList.add('open')">+ Novo patrocinador</button>
    </div>
    <div class="content">
      <div class="grid g-4" id="sp-grid"></div>
      <p class="text-faint" id="sp-vazio" style="display:none">Nenhum patrocinador cadastrado ainda.</p>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-sp">
  <div class="modal">
    <h3 class="h-display" style="font-size:20px;margin-bottom:18px">Novo patrocinador</h3>
    <div class="field"><label>Nome</label><input type="text" id="m-nome"></div>
    <div class="field"><label>Cota</label><select id="m-tier"><option>Ouro</option><option>Prata</option><option>Bronze</option></select></div>
    <div class="flex gap-12"><button class="btn btn-ghost" onclick="document.getElementById('modal-sp').classList.remove('open')">Cancelar</button><button class="btn btn-primary" style="flex:1" onclick="salvar()">Salvar</button></div>
  </div>
</div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','patrocinadores');
const campeonato = arenaCampeonatoAtivo();
renderTopbar('Patrocinadores', campeonato ? campeonato.nome : 'Nenhum campeonato ativo');

function render(){
  const sp = arenaListar('sponsors');
  document.getElementById('sp-vazio').style.display = sp.length ? 'none' : 'block';
  document.getElementById('sp-grid').innerHTML = sp.map(s=>`
    <div class="card" style="text-align:center;position:relative">
      <span style="position:absolute;top:10px;right:12px;cursor:pointer;color:var(--chalk-faint);font-weight:700" onclick="arenaRemover('sponsors','${s.id}');render()">✕</span>
      <div style="font-family:var(--font-display);font-size:16px;text-transform:uppercase">${s.nome}</div>
      <span class="badge badge-muted" style="margin-top:8px">${s.tier}</span>
    </div>`).join('');
}
function salvar(){
  const nome = document.getElementById('m-nome').value.trim(); if(!nome) return;
  arenaAdicionar('sponsors', {nome, tier:document.getElementById('m-tier').value}, 'sp');
  document.getElementById('modal-sp').classList.remove('open'); document.getElementById('m-nome').value='';
  render();
}
render();
</script>
</body>
</html>
