<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor da Landing Page — Admin Crossbox</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div><div class="topbar-title" style="font-weight:700;font-size:16px"></div><div class="topbar-subtitle text-faint" style="font-size:12.5px"></div></div>
      <a href="../index.html" target="_blank" class="btn btn-ghost btn-sm">Ver página ao vivo ↗</a>
    </div>
    <div class="content" id="conteudo">
    </div>
  </div>
</div>
<div class="toast" id="toast"><span>✅</span><span id="toast-msg"></span></div>
<script src="../assets/js/store.js"></script>
<script src="../assets/js/db.js"></script>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/shell.js"></script>
<script>
arenaExigirLogin('admin', 'login.html');
renderSidebar('admin','landing');

const ESTADOS = [
  {id:'pre_inscricao', label:'Em breve'},
  {id:'inscricoes_abertas', label:'Inscrições abertas'},
  {id:'inscricoes_encerradas', label:'Inscrições encerradas'},
  {id:'andamento', label:'Em andamento'},
  {id:'finalizado', label:'Finalizado'},
];

const camp = arenaCampeonatoAtivo();
renderTopbar('Editor da Landing Page', camp ? camp.nome : 'Nenhum campeonato publicado');

if(!camp){
  document.getElementById('conteudo').innerHTML = `<div class="card" style="text-align:center;padding:56px 24px">
    <h3 class="h-display" style="font-size:20px;margin-bottom:10px">Nenhum campeonato publicado ainda</h3>
    <p class="text-dim" style="margin-bottom:20px">Crie e publique um campeonato pra poder editar a landing page.</p>
    <a href="novo-campeonato.html" class="btn btn-primary btn-sm">Criar campeonato</a>
  </div>`;
} else {
  const idxAtual = ESTADOS.findIndex(e=>e.id===camp.estado);
  document.getElementById('conteudo').innerHTML = `
    <div class="card" style="margin-bottom:24px">
      <h3 class="h-display" style="font-size:16px;margin-bottom:6px">Estado atual da página</h3>
      <p class="text-dim" style="font-size:13.5px;margin-bottom:16px">A landing page muda sozinha conforme o campeonato avança pelos estados abaixo.</p>
      <div class="stepper">
        ${ESTADOS.map((e,i)=>`<div class="step ${i<idxAtual?'done':i===idxAtual?'current':''}"><div class="step-dot">${i<idxAtual?'✓':i+1}</div><span class="step-label">${e.label}</span></div>${i<ESTADOS.length-1?'<div class="step-line '+(i<idxAtual?'done':'')+'"></div>':''}`).join('')}
      </div>
      <div class="field" style="margin-top:20px;max-width:280px"><label>Avançar estado manualmente</label>
        <select id="f-estado">${ESTADOS.map(e=>`<option value="${e.id}" ${e.id===camp.estado?'selected':''}>${e.label}</option>`).join('')}</select>
      </div>
    </div>

    <div class="card">
      <h3 class="h-display" style="font-size:16px;margin-bottom:18px">Conteúdo editável</h3>
      <div class="field"><label>Título de destaque</label><input type="text" id="f-nome" value="${camp.nome||''}"></div>
      <div class="field"><label>Descrição</label><textarea rows="2" id="f-desc">${camp.descricao||''}</textarea></div>
      <div class="field"><label>Local</label><input type="text" id="f-local" value="${camp.local||''}"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="salvar()">Salvar e publicar</button>
    </div>
  `;
}

function salvar(){
  arenaSalvarRascunhoCampeonato({
    nome: document.getElementById('f-nome').value.trim(),
    descricao: document.getElementById('f-desc').value.trim(),
    local: document.getElementById('f-local').value.trim(),
    estado: document.getElementById('f-estado').value,
  });
  mostrarToast('Alterações publicadas na landing page.');
  renderTopbar('Editor da Landing Page', document.getElementById('f-nome').value.trim());
}
function mostrarToast(msg){ const t=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
