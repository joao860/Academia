<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking completo — Arena Games 2026</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<nav class="nav"><div class="wrap nav-inner">
  <a href="index.html" class="brand"><span class="brand-mark">C</span> Crossbox</a>
  <a href="index.html" class="btn btn-ghost btn-sm">← Voltar</a>
</div></nav>
<section class="section-tight">
  <div class="wrap">
    <span class="eyebrow" id="camp-eyebrow">Campeonato</span>
    <h1 class="h-display" style="margin:10px 0 28px">Ranking completo</h1>
    <div class="tabs" id="cat-tabs"></div>
    <div class="card" style="overflow-x:auto">
      <table class="table">
        <thead><tr><th>#</th><th>Equipe</th><th>Categoria</th><th>Pontos</th></tr></thead>
        <tbody id="rk-body"></tbody>
      </table>
    </div>
    <p class="text-faint" id="rk-vazio" style="display:none;margin-top:16px">Nenhum resultado no ranking ainda.</p>
  </div>
</section>
<script src="assets/js/store.js"></script>
<script src="assets/js/db.js"></script>
<script src="assets/js/mock-data.js"></script>
<script>
const camp = arenaCampeonatoAtivo();
document.getElementById('camp-eyebrow').textContent = camp ? camp.nome : 'Crossbox';
const categorias = arenaListar('categorias');
document.getElementById('cat-tabs').innerHTML = categorias.length ? categorias.map((c,i)=>`<div class="tab ${i===0?'active':''}">${c.nome}</div>`).join('') : '';
const ranking = arenaListar('ranking').sort((a,b)=>(a.pos||99)-(b.pos||99));
document.getElementById('rk-vazio').style.display = ranking.length ? 'none' : 'block';
document.getElementById('rk-body').innerHTML = ranking.map(r=>`
  <tr><td><span class="rank-num ${r.pos<=3?'top':''}">${r.pos||'—'}º</span></td><td>${r.equipe}</td><td><span class="badge badge-muted">${r.categoria||'—'}</span></td><td class="mono" style="font-weight:700">${r.pontos} pts</td></tr>`).join('');
</script>
</body>
</html>
