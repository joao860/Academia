<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso do juiz — Crossbox</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="max-width:400px;width:100%">
    <span class="eyebrow">Painel do juiz</span>
    <h1 class="h-display" style="margin:10px 0 6px;font-size:28px">Acesso do juiz</h1>
    <p class="text-dim" style="margin-bottom:24px;font-size:14px">Acesso liberado apenas durante o campeonato em andamento, restrito às equipes atribuídas a você.</p>
    <form onsubmit="fazerLoginJuiz(event)">
      <div class="field"><label>E-mail</label><input type="email" id="log-email" value="rafael@crossbox.com" required></div>
      <div class="field"><label>Senha</label><input type="password" id="log-senha" value="12345678" required></div>
      <p class="text-faint" id="log-erro" style="color:var(--danger);font-size:13px;margin:-8px 0 16px;display:none"></p>
      <button class="btn btn-primary btn-block" type="submit">Entrar</button>
    </form>
    <p class="text-faint" style="text-align:center;font-size:12.5px;margin-top:20px"><a href="index.html" style="text-decoration:underline">Voltar para o site</a></p>
  </div>
</div>
<script src="assets/js/store.js"></script>
<script src="assets/js/db.js"></script>
<script>
function fazerLoginJuiz(e){
  e.preventDefault();
  const r = arenaLoginJuiz(document.getElementById('log-email').value, document.getElementById('log-senha').value);
  const erroEl = document.getElementById('log-erro');
  if(r.erro){ erroEl.textContent = r.erro; erroEl.style.display='block'; return; }
  window.location.href = 'juiz-dashboard.html';
}
</script>
</body>
</html>
